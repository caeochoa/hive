<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }} — Hive Comb</title>
<style>
/* ── Theme variables ─────────────────────────────────────── */
body[data-theme="terminal-dark"] {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
  --metric-color: #f0883e; --header-bg: #0d1117;
  --status-ok: #3fb950; --status-warn: #f0883e; --status-error: #f85149;
  --status-neutral: #8b949e; --pre-bg: #0d1117;
  --table-stripe: rgba(255,255,255,0.03); --btn-hover: rgba(255,255,255,0.08);
  --shadow: none; --modal-overlay: rgba(0,0,0,0.7);
}
body[data-theme="clean-light"] {
  --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-muted: #64748b; --accent: #3b82f6;
  --metric-color: #0f172a; --header-bg: #ffffff;
  --status-ok: #22c55e; --status-warn: #f59e0b; --status-error: #ef4444;
  --status-neutral: #94a3b8; --pre-bg: #f1f5f9;
  --table-stripe: rgba(0,0,0,0.025); --btn-hover: rgba(0,0,0,0.06);
  --shadow: 0 1px 4px rgba(0,0,0,0.08); --modal-overlay: rgba(0,0,0,0.4);
}
body[data-theme="bold-dark"] {
  --bg: #1a1a2e; --surface: #16213e; --border: #2d3561;
  --text: #e2e8f0; --text-muted: #a0aec0; --accent: #6366f1;
  --metric-color: #ffffff; --header-bg: #1a1a2e;
  --status-ok: #10b981; --status-warn: #f59e0b; --status-error: #ef4444;
  --status-neutral: #a0aec0; --pre-bg: #0f0f1a;
  --table-stripe: rgba(255,255,255,0.04); --btn-hover: rgba(255,255,255,0.1);
  --shadow: 0 2px 8px rgba(0,0,0,0.4); --modal-overlay: rgba(0,0,0,0.7);
}

/* ── Base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 1.5rem;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Page header ─────────────────────────────────────────── */
.page-header {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.page-header h1 { font-size: 1.25rem; font-weight: 600; }
.page-header .back { font-size: 1rem; color: var(--text-muted); }

/* ── Grid ────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
  gap: 1rem;
}

/* ── Cell card ───────────────────────────────────────────── */
.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  overflow: hidden;
  isolation: isolate;
}
.cell-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.6rem 0.875rem;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
}
.cell-title {
  font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-muted);
}
.cell-subtitle {
  font-size: 0.7rem; color: var(--text-muted);
  margin-top: 0.15rem;
}
.cell-controls { display: flex; gap: 0.25rem; }
.cell-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 0.85rem;
  padding: 0.2rem 0.35rem; border-radius: 4px;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.cell-btn:hover { background: var(--btn-hover); color: var(--text); }
.cell-body {
  padding: 0.875rem;
  flex: 1;
  overflow: hidden;
}

/* ── Pre / log ───────────────────────────────────────────── */
pre {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 0.75rem; line-height: 1.55;
  background: var(--pre-bg); color: var(--text);
  padding: 0.625rem; border-radius: 6px;
  max-height: 360px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}

/* ── Markdown ────────────────────────────────────────────── */
.md-content { font-size: 0.875rem; line-height: 1.65; color: var(--text); }
.md-content h1,.md-content h2,.md-content h3 { margin: 0.75rem 0 0.35rem; font-weight: 600; }
.md-content h1 { font-size: 1.1rem; }
.md-content h2 { font-size: 1rem; }
.md-content h3 { font-size: 0.9rem; }
.md-content p { margin: 0.4rem 0; }
.md-content ul,.md-content ol { padding-left: 1.4rem; margin: 0.4rem 0; }
.md-content code {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 0.8rem; background: var(--pre-bg);
  padding: 0.1em 0.35em; border-radius: 3px;
}
.md-content pre { margin: 0.5rem 0; }
.md-content blockquote {
  border-left: 3px solid var(--border); padding-left: 0.75rem;
  color: var(--text-muted); margin: 0.5rem 0;
}

/* ── Metric ──────────────────────────────────────────────── */
.metric-value {
  font-size: 2.5rem; font-weight: 700;
  color: var(--metric-color); line-height: 1.1;
}

/* ── Status ──────────────────────────────────────────────── */
.status-wrap { display: flex; align-items: center; gap: 0.75rem; padding: 0.25rem 0; }
.status-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.ok    { background: var(--status-ok);      box-shadow: 0 0 6px var(--status-ok); }
.status-dot.warn  { background: var(--status-warn);    box-shadow: 0 0 6px var(--status-warn); }
.status-dot.error { background: var(--status-error);   box-shadow: 0 0 6px var(--status-error); }
.status-dot.neutral { background: var(--status-neutral); }
.status-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600;
}
.status-badge.ok    { background: color-mix(in srgb, var(--status-ok) 15%, transparent);    color: var(--status-ok); }
.status-badge.warn  { background: color-mix(in srgb, var(--status-warn) 15%, transparent);  color: var(--status-warn); }
.status-badge.error { background: color-mix(in srgb, var(--status-error) 15%, transparent); color: var(--status-error); }
.status-badge.neutral { background: color-mix(in srgb, var(--status-neutral) 15%, transparent); color: var(--status-neutral); }

/* ── Table ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; max-height: 360px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th {
  text-align: left; padding: 0.4rem 0.6rem;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted); font-size: 0.7rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: var(--accent); }
th .sort-icon { margin-left: 0.25rem; opacity: 0.5; }
th.sorted-asc .sort-icon::after  { content: ' ↑'; }
th.sorted-desc .sort-icon::after { content: ' ↓'; }
th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after { content: ' ↕'; }
td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: var(--table-stripe); }

/* ── Chart ───────────────────────────────────────────────── */
.chart-wrap { width: 100%; }
.chart-wrap svg { width: 100%; display: block; }

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--modal-overlay); z-index: 9999;
  align-items: center; justify-content: center;
  padding: 2rem;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  width: 100%; max-width: 860px; max-height: 80vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 1.1rem; padding: 0.2rem 0.4rem;
  border-radius: 4px;
}
.modal-close:hover { background: var(--btn-hover); color: var(--text); }
.modal-body { padding: 1rem; overflow-y: auto; flex: 1; }
.modal-body pre { max-height: none; }

/* ── Loading / error ─────────────────────────────────────── */
.cell-loading { color: var(--text-muted); font-size: 0.8rem; padding: 0.25rem 0; }
.cell-error { color: var(--status-error); font-size: 0.8rem; padding: 0.25rem 0; }
</style>
</head>
<body data-theme="{{ theme }}">

<div class="page-header">
  <a class="back" href="/">←</a>
  <h1>{{ name }}</h1>
</div>

<div class="grid">
{% for cell in cells %}
<div class="cell" id="cell-{{ loop.index0 }}">
  <div class="cell-header">
    <div>
      <div class="cell-title">{{ cell.title }}</div>
      <div class="cell-subtitle" id="subtitle-{{ loop.index0 }}"></div>
    </div>
    <div class="cell-controls">
      <button class="cell-btn" title="Refresh" onclick="refreshCell({{ loop.index0 }})">↺</button>
      {% if cell.type != "app" %}
      <button class="cell-btn" title="Expand" onclick="expandCell({{ loop.index0 }})">⤢</button>
      {% endif %}
    </div>
  </div>
  <div class="cell-body" id="body-{{ loop.index0 }}">
    {% if cell.type != "app" %}<span class="cell-loading">Loading…</span>{% endif %}
  </div>
</div>
{% endfor %}
</div>

<!-- Expand modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const WORKER = {{ name | tojson }};
const CELL_TYPES = {{ cell_types | tojson }};
const CELL_SLUGS = {{ cell_slugs | tojson }};
const essSources = {};   // index → EventSource
const cellData = {};     // index → last fetched data node (for expand)
const sortState = {};    // index → {col, dir}

// ── Renderers ────────────────────────────────────────────────────────────────

function renderApp(i, container) {
  const slug = CELL_SLUGS[i];
  const url = `/workers/${WORKER}/apps/${slug}`;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:1.5rem 0;';
  const btn = document.createElement('a');
  btn.href = url;
  btn.textContent = 'Open';
  btn.style.cssText = 'display:inline-block;padding:0.5rem 1.5rem;background:var(--accent);color:#fff;border-radius:6px;font-weight:600;font-size:0.875rem;text-decoration:none;';
  wrap.appendChild(btn);
  container.replaceChildren(wrap);
  return wrap;
}

function renderLog(i, container) {
  const pre = document.createElement('pre');
  container.replaceChildren(pre);
  if (essSources[i]) essSources[i].close();
  const src = new EventSource(`/workers/${WORKER}/cells/${i}/stream`);
  essSources[i] = src;
  src.onmessage = e => {
    pre.textContent += e.data + '\n';
    pre.scrollTop = pre.scrollHeight;
  };
  return pre;
}

function renderFile(d, container) {
  if (d.is_markdown) {
    const div = document.createElement('div');
    div.className = 'md-content';
    div.innerHTML = d.content;
    container.replaceChildren(div);
    return div;
  } else {
    const pre = document.createElement('pre');
    pre.textContent = d.content;
    container.replaceChildren(pre);
    return pre;
  }
}

function renderMetric(d, container) {
  const p = document.createElement('p');
  p.className = 'metric-value';
  p.textContent = d.content;
  container.replaceChildren(p);
  return p;
}

function renderStatus(d, container) {
  const { value, level } = d.content;
  const wrap = document.createElement('div');
  wrap.className = 'status-wrap';
  const badge = document.createElement('span');
  badge.className = `status-badge ${level}`;
  const dot = document.createElement('span');
  dot.className = `status-dot ${level}`;
  badge.appendChild(dot);
  badge.appendChild(document.createTextNode(value));
  wrap.appendChild(badge);
  container.replaceChildren(wrap);
  return wrap;
}

function renderTable(d, container, i) {
  const rows = d.content;
  if (!rows.length) {
    const msg = document.createElement('span');
    msg.className = 'cell-loading';
    msg.textContent = '(empty)';
    container.replaceChildren(msg);
    return;
  }
  const cols = Object.keys(rows[0]);
  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const tbl = document.createElement('table');
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  const state = sortState[i] || { col: null, dir: 1 };

  cols.forEach(col => {
    const th = document.createElement('th');
    const icon = document.createElement('span');
    icon.className = 'sort-icon';
    if (state.col === col) th.className = state.dir === 1 ? 'sorted-asc' : 'sorted-desc';
    th.textContent = col;
    th.appendChild(icon);
    th.addEventListener('click', () => {
      const newDir = (state.col === col && state.dir === 1) ? -1 : 1;
      sortState[i] = { col, dir: newDir };
      const sorted = [...rows].sort((a, b) => {
        const av = a[col], bv = b[col];
        if (av < bv) return -newDir;
        if (av > bv) return newDir;
        return 0;
      });
      renderTable({ content: sorted }, container, i);
    });
    hrow.appendChild(th);
  });

  thead.appendChild(hrow);
  tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  rows.forEach(row => {
    const tr = document.createElement('tr');
    cols.forEach(col => {
      const td = document.createElement('td');
      td.textContent = row[col] ?? '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  container.replaceChildren(wrap);
  return wrap;
}

function renderChart(d, container) {
  const data = d.content;
  if (!data.length) {
    const msg = document.createElement('span');
    msg.className = 'cell-loading';
    msg.textContent = '(no data)';
    container.replaceChildren(msg);
    return;
  }
  const W = 400, H = 120, PAD = 4;
  const max = Math.max(...data.map(p => p.value), 1);
  const barW = (W - PAD * 2) / data.length;
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');

  // Accent colour from CSS variable
  const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();

  data.forEach((pt, idx) => {
    const barH = Math.max(2, ((pt.value / max) * (H - PAD * 2)));
    const x = PAD + idx * barW;
    const y = H - PAD - barH;
    const rect = document.createElementNS(svgNS, 'rect');
    rect.setAttribute('x', x + barW * 0.1);
    rect.setAttribute('y', y);
    rect.setAttribute('width', barW * 0.8);
    rect.setAttribute('height', barH);
    rect.setAttribute('fill', accent);
    rect.setAttribute('rx', 2);
    rect.setAttribute('opacity', 0.85);

    const title = document.createElementNS(svgNS, 'title');
    title.textContent = `${pt.label}: ${pt.value}`;
    rect.appendChild(title);
    svg.appendChild(rect);
  });

  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap';
  wrap.appendChild(svg);
  container.replaceChildren(wrap);
  return wrap;
}

// ── Fetch & dispatch ─────────────────────────────────────────────────────────

function renderCell(i, d, container) {
  const type = CELL_TYPES[i];
  const subtitleEl = document.getElementById(`subtitle-${i}`);
  if (subtitleEl) subtitleEl.textContent = d.subtitle || '';

  let node;
  if (type === 'file')    node = renderFile(d, container);
  else if (type === 'metric') node = renderMetric(d, container);
  else if (type === 'status') node = renderStatus(d, container);
  else if (type === 'table')  node = renderTable(d, container, i);
  else if (type === 'chart')  node = renderChart(d, container);

  if (node) cellData[i] = { title: d.title, node, isMarkdown: d.is_markdown, rawContent: d.content };
}

function fetchCell(i) {
  const container = document.getElementById(`body-${i}`);
  fetch(`/workers/${WORKER}/cells/${i}`)
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(d => renderCell(i, d, container))
    .catch(err => {
      container.innerHTML = `<span class="cell-error">Error: ${err.message}</span>`;
    });
}

function refreshCell(i) {
  const type = CELL_TYPES[i];
  const container = document.getElementById(`body-${i}`);
  if (type === 'log') {
    container.replaceChildren();
    renderLog(i, container);
  } else if (type === 'app') {
    renderApp(i, container);
  } else {
    fetchCell(i);
  }
}

// ── Modal ────────────────────────────────────────────────────────────────────

function expandCell(i) {
  if (CELL_TYPES[i] === 'app') return;
  const d = cellData[i];
  const modal = document.getElementById('modal');
  const mbody = document.getElementById('modal-body');
  const mtitle = document.getElementById('modal-title');

  const type = CELL_TYPES[i];
  mtitle.textContent = d ? d.title : '';
  mbody.replaceChildren();

  if (type === 'log') {
    const src = essSources[i];
    const origPre = document.querySelector(`#body-${i} pre`);
    const pre = document.createElement('pre');
    pre.textContent = origPre ? origPre.textContent : '';
    mbody.appendChild(pre);
    if (src) {
      src.addEventListener('message', e => {
        pre.textContent += e.data + '\n';
        pre.scrollTop = pre.scrollHeight;
      });
    }
  } else if (d) {
    // Clone the rendered node for the modal
    mbody.appendChild(d.node.cloneNode(true));
  }

  modal.classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.type === 'click') {
    document.getElementById('modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Initialise ───────────────────────────────────────────────────────────────

CELL_TYPES.forEach((type, i) => {
  const container = document.getElementById(`body-${i}`);
  if (type === 'log') {
    renderLog(i, container);
  } else if (type === 'app') {
    renderApp(i, container);
  } else {
    fetchCell(i);
    setInterval(() => fetchCell(i), 10000);
  }
});
</script>
</body>
</html>
