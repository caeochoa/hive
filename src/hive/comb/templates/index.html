<!DOCTYPE html>
<html><head><title>Hive Comb</title>
<style>body{font-family:system-ui;max-width:800px;margin:2rem auto;padding:0 1rem}
a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}
.worker{padding:0.5rem 0;border-bottom:1px solid #e5e7eb}</style>
</head><body>
<h1>Hive Comb</h1>
<p>{{ workers|length }} worker(s) registered</p>
{% for name in workers %}
<div class="worker"><a href="/workers/{{ name }}">{{ name }}</a></div>
{% endfor %}
</body></html>
